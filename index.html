.phead{animation:fadeUp .4s ease both}
.btn{position:relative;overflow:hidden}
.btn::after{content:"";position:absolute;top:0;left:-60%;width:42%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.32),transparent);transform:skewX(-18deg);animation:shine 4.6s ease-in-out infinite;pointer-events:none}
.btn.sec::after,.btn:disabled::after{display:none}
.opt.on .ico{animation:icoPop .3s ease}
.tabbar .tb.on svg{animation:tbpop .32s ease}
.prow:active,.srow:active,.ocard:active,.item:active,.cta-start:active{transform:scale(.99)}
.item,.prow,.ocard,.srow,.cta-start{transition:transform .12s ease}
/* start CTA (distinct from the green primary buttons) */
.cta-start{display:flex;align-items:center;gap:14px;margin:16px 18px 0;padding:18px 16px;border-radius:20px;color:#fff;cursor:pointer;position:relative;overflow:hidden;background:linear-gradient(125deg,#0FA7A0,#2EA84E 52%,#5CB949);box-shadow:0 16px 30px -10px rgba(28,150,90,.55);animation:ctaPulse 2.8s ease-in-out infinite}
.cta-start .ci{width:54px;height:54px;border-radius:15px;background:rgba(255,255,255,.2);display:grid;place-items:center;flex:0 0 auto}
.cta-start .ct{flex:1}.cta-start .ct b{font-size:17px;font-weight:800;display:block}.cta-start .ct span{font-size:12.5px;opacity:.92}
.cta-start::after{content:"";position:absolute;top:0;left:-55%;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.42),transparent);transform:skewX(-18deg);animation:shine 3.4s ease-in-out infinite;pointer-events:none}
/* page header band for tab screens */
.phead{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;padding:20px 18px 22px;border-radius:0 0 22px 22px;flex:0 0 auto}
.phead .pic{width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,.18);display:grid;place-items:center;flex:0 0 auto}
.phead .pht b{font-size:17px;font-weight:800;display:block}.phead .pht span{font-size:12px;opacity:.9}
.stat{background:#fff;border:1px solid #f0f3f1;border-radius:14px;padding:14px;text-align:center;box-shadow:0 8px 22px -16px rgba(20,60,30,.25)}
.stat b{font-size:21px;font-weight:800;color:var(--gd);display:block}.stat span{font-size:11.5px;color:var(--mu)}
.chips{display:flex;gap:8px;margin-bottom:14px}
.chips .c{padding:8px 14px;border-radius:999px;border:1.3px solid var(--bd);background:#fff;font-size:12px;font-weight:700;color:var(--ch2);cursor:pointer;transition:.15s}
.chips .c.on{background:var(--mint);border-color:var(--g);color:var(--gd)}
/* search */
.searchbox{display:flex;align-items:center;gap:10px;background:#fff;border:1.3px solid var(--bd);border-radius:14px;padding:13px 14px;transition:.15s}
.searchbox:focus-within{border-color:var(--g);box-shadow:0 0 0 3px var(--mintsel)}
.searchbox .ic{cursor:pointer}
.sinput{flex:1;border:0;outline:none;font-family:inherit;font-size:14px;color:var(--ch);background:transparent;text-align:right}
.sinput::placeholder{color:var(--mu)}
.optl{font-size:10px;font-weight:700;color:var(--mu);background:var(--bd);padding:2px 8px;border-radius:8px;margin-inline-start:6px}
/* wallet */
.walletcard{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;padding:16px;border-radius:18px;color:#fff;cursor:pointer;background:linear-gradient(125deg,#0FA7A0,#2EA84E 55%,#5CB949);box-shadow:0 14px 28px -12px rgba(28,150,90,.55);position:relative;overflow:hidden}
.walletcard .wic{width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.2);display:grid;place-items:center}
.walletcard::after{content:"";position:absolute;top:0;left:-55%;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.38),transparent);transform:skewX(-18deg);animation:shine 4s ease-in-out infinite;pointer-events:none}
.walletbig{background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;padding:24px 20px 26px;border-radius:0 0 24px 24px;text-align:center;flex:0 0 auto}
/* chat */
.chatsub{flex:0 0 auto;display:flex;align-items:center;gap:6px;justify-content:center;font-size:11.5px;color:var(--gd);background:var(--mint);padding:8px;font-weight:600}
.chatwrap{padding:14px 18px;display:flex;flex-direction:column}
.bub{max-width:80%;padding:11px 14px;border-radius:16px;font-size:13.5px;line-height:1.7;margin-bottom:10px;white-space:pre-wrap}
.bub.bot{background:#fff;border:1px solid var(--bd);border-top-right-radius:5px;margin-inline-end:auto;color:var(--ch)}
.bub.me{background:var(--g);color:#fff;border-top-left-radius:5px;margin-inline-start:auto;box-shadow:0 8px 18px -8px rgba(46,168,78,.5)}
.chatbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:10px 14px calc(12px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--bd)}
.chatbar .sinput{background:var(--bg);border:1.3px solid var(--bd);border-radius:13px;padding:12px 14px}
.chatsend{width:46px;height:46px;flex:0 0 auto;border:0;border-radius:13px;background:var(--g);display:grid;place-items:center;cursor:pointer;box-shadow:0 8px 18px -8px rgba(46,168,78,.6)}
.chatsend svg{transform:rotate(0)}
/* FAB */
.fab{position:absolute;bottom:84px;left:16px;z-index:30;display:flex;align-items:center;gap:8px;border:0;border-radius:999px;background:var(--g);color:#fff;font-family:inherit;font-weight:800;font-size:13px;padding:12px 18px;cursor:pointer;box-shadow:0 14px 26px -8px rgba(46,168,78,.6);animation:fadeUp .5s ease .3s both}
.fab:active{transform:scale(.97)}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>

<div class="sheet" id="sheet"></div>

const GOODS_COURIER_FEE=100000; // هزینهٔ پیش‌فرض پیک داخل قم برای کالا
const GOODS_POST_FEE=100000;    // هزینهٔ پیش‌فرض ارسال با پست
function addrIsBajak(){
  const ad=ADDRS[order.addr];
  if(!ad) return false;
  if(ad[3]==='bajak') return true;
  const txt=(ad[1]||'')+' '+(ad[2]||'');
  return /باجک|۱۹ دی|19 دی/.test(txt);
}
function shipInfo(){
  const goodsSub = order.flow==='goods'
    ? order.items.reduce((s,it)=>s+lineOf(it),0)
    : order.items.reduce((s,it)=>s+lineOf(it),0);
  if(order.flow==='goods'){
    if(order.deliver==='post'){
      return {inBajak:false,freeBase:false,base:GOODS_POST_FEE,exp:0};
    }
    // پیک داخل قم
    const inBajak=addrIsBajak();
    const freeBase=inBajak||(goodsSub>=2000000);
    return {inBajak,freeBase,base:freeBase?0:GOODS_COURIER_FEE,exp:0};
  }
  const ad=ADDRS[order.addr]; const inBajak=!!(ad&&ad[3]==='bajak');
  const freeBase=inBajak||(goodsSub>=2000000);
  return {inBajak,freeBase,base:freeBase?0:45000,exp:order.speed==='express'?60000:0};
}
function shippingFee(){ if(order.deliver==='pickup')return 0; const i=shipInfo(); return i.base+i.exp; }
function totals(){
  const isOtc=order.flow==='otc';
  const sub=order.items.reduce((s,it)=>s+lineOf(it),0);
  const discount=0;
  const insurance=(order.flow==='eRx'||order.flow==='paperRx')?40000:0;
  const goods=isOtc ? (order.total||order.fee||0) : Math.max(0,sub-discount-insurance);
  const ship=shippingFee();
  return {sub,discount,insurance,goods,ship,total:goods+ship};
}

function searchResults(q){
 if(!q) return `<div class="sub" style="margin-bottom:10px">نام دارو را تایپ کنید...</div>`;
 const list=OTC_DB.filter(m=>m.fullName.includes(q)||m.name.includes(q)||m.en.toLowerCase().includes(q.toLowerCase()));
 if(!list.length) return `<div class="emptybox"><div class="ei">${icn('search',30,'#2EA84E')}</div>«${q}» در لیست OTC نیست.<br><button class="btn-out" style="margin:16px auto 0;width:auto;padding:0 18px" data-act="reqCustom">${icn('plus',18,'#2EA84E')}ثبت دستی برای بررسی داروخانه</button></div>`;
 return list.slice(0,20).map((m,i)=>`<div class="item" data-act="addSearch" data-i="${OTC_DB.indexOf(m)}"><div class="thumb">${icn(m.icon||'pill',24,'#2EA84E')}</div><div class="meta"><b>${m.fullName}</b></div><span class="ic" style="color:var(--g)">${icn('plus',22,'#2EA84E')}</span></div>`).join('');
}
function search(){
 const isOtc=order.flow==='otc';
 const cartCount=order.items.length;
 return `<div class="screen">${ab(isOtc?'انتخاب دارو (OTC)':'جستجوی دارو و محصولات',null,null,true)}
  <div style="padding:0 16px 8px">
   <div class="searchbox"><span class="ic">${icn('search',18,'#8A9099')}</span><input id="search-input" class="sinput" placeholder="نام دارو را تایپ کنید…" value="${order.searchQ||''}" autocomplete="off"><span class="ic" id="clr" data-act="clearSearch" style="${order.searchQ?'':'display:none'}">${icn('x',18,'#8A9099')}</span></div>
  </div>
  ${isOtc&&cartCount?`<div style="padding:0 16px 8px"><div class="card" style="background:var(--mint);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer" data-act="goToOtcCart"><div style="font-size:13px;color:var(--gd);font-weight:700">${icn('bag',16,'#2EA84E')} ${toFa(cartCount)} قلم انتخاب‌شده</div><button class="btn primary" style="height:34px;font-size:13px" data-act="goToOtcCart">ادامه ${icn('arrowL',16,'#fff')}</button></div></div>`:''}
  <div class="body"><div class="content" id="search-results" style="padding-top:6px"></div></div>
  ${isOtc?`<div class="foot" style="${cartCount?'':'display:none'}" id="otc-foot"><button class="btn" data-act="goToOtcCart">ادامه با ${toFa(cartCount)} قلم ${icn('arrowL',20,'#fff')}</button></div>`:''}
  </div>`;
}

function tabbar(active){
  const tabs=[['home','خانه','home'],['bag','سفارش‌ها','orders'],['heart','داروهای من','savedMeds'],['user','پروفایل','profile']];
  return `<div class="tabbar">${tabs.map(t=>`<div class="tb ${active===t[2]?'on':''}" data-act="tab" data-screen="${t[2]}">${icn(t[0],22,active===t[2]?'#2EA84E':'#8A9099')}${t[1]}</div>`).join('')}</div>`;

function tracking(){
  if(order.flow==='goods'){
    const st=order.serverStatus||'paid';
    const d=order.deliver;
    const doneN = st==='delivered'?9 : st==='ready'?2 : (st==='preparing'||st==='paid')?1 : 1;
    let steps;
    if(d==='courier'){
      steps=[['ثبت سفارش','سفارش شما ثبت و پرداخت شد',true],
             ['در حال آماده‌سازی','داروخانه در حال آماده‌سازی محصولات است',doneN>=2],
             ['تحویل پیک شد','سفارش تحویل پیک شد و در مسیر شماست',doneN>=3||st==='ready'||st==='delivered'],
             ['تحویل شد','سفارش تحویل داده شد',st==='delivered']];
    } else if(d==='post'){
      steps=[['ثبت سفارش','سفارش شما ثبت و پرداخت شد',true],
             ['در حال آماده‌سازی','داروخانه در حال آماده‌سازی محصولات است',doneN>=2],
             ['تحویل پست شد',order.postTrack?`کد رهگیری مرسوله: <b style="letter-spacing:1px;color:var(--gd)">${order.postTrack}</b>`:'مرسوله تحویل پست شد',st==='ready'||st==='delivered']];
    } else {
      steps=[['ثبت سفارش','سفارش شما ثبت و پرداخت شد',true],
             ['در حال آماده‌سازی','داروخانه در حال آماده‌سازی محصولات است',doneN>=2],
             ['آمادهٔ تحویل','آماده شد، برای تحویل تشریف بیاورید 🎉',st==='ready'||st==='delivered']];
    }
    // «آماده‌سازی» وقتی done است که از preparing گذشته باشیم
    steps[1][2]= st==='ready'||st==='delivered';
    let nowIdx=steps.findIndex(s=>!s[2]); if(nowIdx<0)nowIdx=steps.length;
    const nodes=steps.map((s,i)=>{
      const done=s[2];
      const cls = done?'done':(i===nowIdx?'now':'');
      return `<div class="node"><span class="dot ${cls}">${done?icn('check',16,'#fff',2.4):''}</span><b style="color:${done||i===nowIdx?'var(--ch)':'var(--mu)'}">${s[0]}</b>${i===nowIdx?'<span class="nowtag">اکنون</span>':''}<div class="f" style="font-size:11.5px;color:var(--mu);margin-top:3px">${s[1]}</div></div>`;
    }).join('');
    const lastDone=steps[steps.length-1][2];
    const head = lastDone ? (d==='pickup'?'سفارش آمادهٔ تحویل است':d==='post'?'مرسوله تحویل پست شد':'سفارش شما تحویل داده شد') : 'سفارش شما در حال پیگیری است';
    const dLabel = d==='pickup'?'تحویل حضوری از داروخانه':d==='post'?'ارسال با پست':'ارسال با پیک';
    return `<div class="screen">${ab('پیگیری سفارش')}
     <div class="body"><div class="content center">
       <div class="okwrap" style="background:var(--mint)"><div class="ok" style="background:#fff;border:2px solid var(--g);box-shadow:none">${lastDone?icn('check',46,'#2EA84E',2.6):'<div class="spinner"></div>'}</div></div>
       <div class="h1" style="font-size:18px">${head}</div>
       <div class="sub" style="text-align:center">کد سفارش: ${order.code} • ${dLabel}</div>
       <div class="card" style="width:100%;text-align:right"><div class="sectit" style="justify-content:flex-start;margin:2px 0 16px">وضعیت سفارش</div><div class="tl">${nodes}</div></div>
       ${!lastDone?`<div class="item" style="width:100%;margin-top:12px;align-items:center"><div class="thumb" style="width:44px;height:44px;background:var(--mint)">${icn('bell',20,'#2EA84E')}</div><div class="meta"><b style="font-size:13px">به‌محض تغییر وضعیت، پیام می‌دهیم</b><div class="f">می‌توانید برنامه را ببندید.</div></div></div>`:''}
     </div></div>
     <div class="foot"><button class="btn sec" data-act="goHome">بازگشت به خانه</button></div></div>`;
  }
  const send=order.deliver!=='pickup';
  const steps = send
    ? [['ثبت سفارش','سفارش شما ثبت شد',true],['در حال آماده‌سازی','داروساز در حال آماده‌سازی اقلام است',order.trackStage>=1],['تحویل به پیک','سفارش تحویل پیک شد',order.trackStage>=2],['در مسیر شما','پیک به‌سمت آدرس شما حرکت کرد',order.trackStage>=3],['تحویل شد','سفارش تحویل داده شد',order.trackStage>=4]]
    : [['ثبت سفارش','سفارش شما ثبت شد',true],['در حال آماده‌سازی','به محض آماده شدن به شما پیام می‌دهیم',order.trackStage>=1],['آمادهٔ تحویل حضوری','آماده است، تشریف بیاورید 🎉',order.trackStage>=2]];
  let nowIdx=steps.findIndex(s=>!s[2]); if(nowIdx<0)nowIdx=steps.length;
  const nodes=steps.map((s,i)=>{
    const done=s[2], now=(i===nowIdx-1)&& nowIdx<steps.length ? false : false;
    const isNow = i===nowIdx; // next pending = current activity
    const cls = done?'done':(i===nowIdx?'now':'');
    return `<div class="node"><span class="dot ${cls}">${done?icn('check',16,'#fff',2.4):''}</span><b style="color:${done||i===nowIdx?'var(--ch)':'var(--mu)'}">${s[0]}</b>${i===nowIdx?'<span class="nowtag">اکنون</span>':''}<div class="f" style="font-size:11.5px;color:var(--mu);margin-top:3px">${s[1]}</div></div>`;
  }).join('');
  const lastDone = steps[steps.length-1][2];
  const head = lastDone ? (send?'سفارش شما تحویل داده شد':'سفارش شما آمادهٔ تحویل است') : 'سفارش شما در حال پیگیری است';
  return `<div class="screen">${ab('پیگیری سفارش')}
   <div class="body"><div class="content center">
     <div class="okwrap" style="background:${send?'var(--coldt)':'var(--mint)'}"><div class="ok" style="background:#fff;border:2px solid ${lastDone?'var(--g)':(send?'var(--cold)':'var(--g)')};box-shadow:none">${lastDone?icn('check',46,'#2EA84E',2.6):(send?icn('truck',40,'#2E8FD0'):'<div class="spinner"></div>')}</div></div>

function handleRxFileChange(inp){
  const file = inp.files[0];
  if(!file) return;
  if(file.size > 10*1024*1024){ toast('حجم فایل نباید بیشتر از ۱۰ مگابایت باشد'); return; }
  const r = new FileReader();
  r.onload = function(ev){
    order.rxImageData = ev.target.result;
    order.rxImageName = file.name;
    order.rxImageSize = (file.size/1024/1024).toFixed(1);
    // دوباره همین صفحه را رندر کن تا پیش‌نمایش نمایش داده شود
    app.innerHTML = SCREENS['paperUpload']();
  };
  r.readAsDataURL(file);
}

// تابع سرچ محصولات آرایشی بهداشتی
function searchGoods(q){
  if(!q||q.length<2) return [];
  const ql=q.toLowerCase();
  return PRODUCTS_DB.filter(p=>
    p.title.includes(q)||p.title.toLowerCase().includes(ql)||
    (p.summary&&p.summary.includes(q))
  ).slice(0,20);
}

const SCREENS={home,orders,savedMeds,profile,myDetails,personForm,walletScreen,gateway,support,tracking,rxRejected,partial,payFailed,search,requestType,prescriptionType,eRxForm,paperUpload,productAdd,wait,itemsConfirm,priceWait,invoice,coldChain,deliveryMethod,addressShipping,payment,success,addressForm,otcPersonInfo,otcWait,goodsSearch,goodsCart,goodsPersonInfo};
const TAB_ROOTS=['home','orders','savedMeds','profile'];
const app=document.getElementById('app');
let cur='home', hist=[], reviewTimer=null, trackTimer=null, priceTimer=null;

function render(name,animate=true,dir='fwd'){ app.innerHTML=SCREENS[name](); const s=app.firstElementChild; if(s){ if(!animate)s.classList.add('static'); else s.classList.add(dir==='back'?'in-back':'in-fwd'); } const b=app.querySelector('.body'); if(b)b.scrollTop=0; onEnter(name); syncBack(); }
function go(name,push=true){ if(push && name!==cur) hist.push(cur); cur=name; render(name,true,'fwd'); }
function back(){ if(hist.length){ cur=hist.pop(); render(cur,true,'back'); } else { go('home',false); } }
function gotoTab(name){ hist=[]; order.tracking=false; cur=name; render(name,true,'fwd'); }
function syncBack(){ if(tg&&tg.BackButton){ (hist.length && !TAB_ROOTS.includes(cur))?tg.BackButton.show():tg.BackButton.hide(); } }

function renderChat(){ const box=app.querySelector('#chat-msgs'); if(box) box.innerHTML=CHAT.map(m=>`<div class="bub ${m.from}">${m.text}</div>`).join(''); const body=app.querySelector('#chat-body'); if(body) body.scrollTop=body.scrollHeight; }
async function doChatSend(){
  const inp=app.querySelector('#chat-input'); if(!inp||!inp.value.trim())return;
  const txt=inp.value.trim(); CHAT.push({from:'me',text:txt}); inp.value=''; renderChat();
  try{
    // اولین پیام: نام و سفارش مرتبط را هم می‌فرستیم تا در پنل داروساز دیده شود
    const body={ from:'user', text:txt };
    if(!order._supportSent){
      body.name=order.supportName||'';
      if(order.supportOrder) body.relatedOrder=order.supportOrder;
      order._supportSent=true;
    }
    await api('/api/chats/'+getTelegramUserId()+'/messages', { method:'POST', body: JSON.stringify(body) });
  }
  catch(e){ console.error('ارسال پیام ناموفق بود', e); }
}
async function loadChatHistory(){
  try{
    const { chat } = await api('/api/chats/'+getTelegramUserId());
    CHAT = chat.msgs.map(m=>({ from: m.from==='pharmacist' ? 'bot' : 'me', text: m.text }));
    if(!CHAT.length) CHAT=[{from:'bot',text:'سلام 👋 به پشتیبانی داروخانهٔ دکتر پیرصالحی خوش آمدید. چطور می‌توانیم کمکتان کنیم؟'}];
  }catch(e){ /* مکالمه‌ای هنوز وجود ندارد — همان پیام خوش‌آمد پیش‌فرض می‌ماند */ }
  renderChat();
}

function onEnter(name){
  if(name==='wait' && !order.tracking && !order.reviewed){
    startReviewPolling();   // به‌جای تایمر شبیه‌سازی، واقعاً از سرور می‌پرسیم
  }
  if(name==='search'){
    const inp=app.querySelector('#search-input'), box=app.querySelector('#search-results');
    if(box) box.innerHTML=searchResults((order.searchQ||'').trim());
    if(inp){ try{inp.focus();}catch(e){}
      inp.addEventListener('input',()=>{ order.searchQ=inp.value; const clr=app.querySelector('#clr'); if(clr)clr.style.display=order.searchQ?'':'none'; box.innerHTML=searchResults(order.searchQ.trim()); });
    }
  }
  if(name==='support'){
    if(!order.supportName){ loadMyOrders(); return; } // صفحهٔ فرم اطلاعات — سفارش‌ها را برای dropdown بارگذاری کن
    loadChatHistory();
    const inp=app.querySelector('#chat-input');
    if(inp){ try{inp.focus();}catch(e){} inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); doChatSend(); } }); }
  }
  if(name==='tracking'){
    startDeliveryPolling();   // به‌جای تایمر شبیه‌سازی، واقعاً از سرور می‌پرسیم داروساز چه مرحله‌ای را ثبت کرده
  }
  if(name==='productAdd'){
    setTimeout(()=>{
      const inp=document.getElementById('prod-q');
      if(inp){ inp.focus(); inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); document.querySelector('[data-act="prodSearch"]')?.click(); } }); }
    },100);
  }
  if(name==='priceWait'){
    startPriceWaitPolling();
  }
  if(name==='otcWait'){
    startOtcWaitPolling();  // منتظر تأیید داروساز برای OTC
  }
  if(name==='goodsSearch'){
    const inp=app.querySelector('#goods-input');
    if(inp){ try{inp.focus();}catch(e){}
      inp.addEventListener('input',()=>{
        order.searchQ=inp.value;
        const clr=app.querySelector('#goods-clr');
        if(clr) clr.style.display=order.searchQ?'':'none';
        app.innerHTML=SCREENS['goodsSearch']();
        const ni=app.querySelector('#goods-input');
        if(ni){ni.focus();ni.setSelectionRange(ni.value.length,ni.value.length);}
        onEnter('goodsSearch');
      });
    }
  }
  if(name==='orders'){
    loadMyOrders();
  }
}

// سفارش‌های واقعی این کاربر را از سرور می‌خواند و در صفحهٔ «سفارش‌های من» نشان می‌دهد
// با کلیک روی یک سفارش در لیست «سفارش‌های من»، اطلاعاتش را از سرور می‌خوانیم
// و بسته به وضعیتش، کاربر را به همان صفحهٔ مناسب (در حال بررسی/پیگیری/فاکتور) می‌بریم
async function openOrderById(id){
  try{
    const { order: srv } = await api('/api/orders/'+id);
    order.serverId = srv.id;
    order.flow = srv.type;
    order.serverStatus = srv.status;
    order.prescType = srv.type==='paper' ? 'paperRx' : 'eRx';
    order.trackingCode = srv.track || '';
    order.fullName = srv.name || '';
    order.items = (srv.items||[]).map(fromServerItem);
    order.hasCold = order.items.some(i=>i.cold);
    order.fee = srv.fee || 0;
    order.total = srv.total || srv.fee || 0;
    order.deliver = srv.deliver;
    order.postTrack = srv.postTrack || '';
    order.trackStage = srv.deliveryStage||0;

    if(srv.status==='rejected'){ order.rejectReason = srv.rejectReason || 'نسخه رد شد.'; go('rxRejected'); }
    else if(srv.type==='otc' && srv.status==='wait'){ go('otcWait'); }
    else if(srv.status==='wait' || srv.status==='review'){ order.reviewed=false; go('wait'); }
    else if(srv.status==='items_sent'){ order.reviewed=true; order.rxItemsAck=false; go('itemsConfirm'); }
    else if(srv.status==='items_confirmed'){ go('priceWait'); }
    else if(srv.status==='awaiting_payment'){ go('invoice'); }
    else if(['paid','preparing','ready','delivered'].includes(srv.status)){ go('tracking'); }
    else { go('wait'); }
  }catch(e){ console.error('باز کردن سفارش ناموفق بود', e); toast('خطا در دریافت اطلاعات سفارش'); }
}

async function loadMyOrders(){
  try{
    const { orders: srv } = await api('/api/orders/by-user/'+getTelegramUserId());
    const STATUS_FA={wait:'در حال بررسی',review:'در حال بررسی',items_sent:'منتظر تأیید شما',items_confirmed:'در حال قیمت‌گذاری',awaiting_payment:'در انتظار پرداخت',paid:'پرداخت شد',preparing:'در حال آماده‌سازی',ready:'آماده تحویل',delivered:'تحویل شد',rejected:'رد شد'};
    ORDERS = srv.slice().reverse().map(o=>({
      code:o.id,
      id:o.id,
      rawStatus:o.status,
      date: timeAgoFa(o.updatedAt||o.createdAt),
      total:o.total||0,
      count:(o.items||[]).length,
      status: STATUS_FA[o.status]||o.status,
      kind: o.status==='delivered'?'green':(o.status==='rejected'?'red':'amber'),
      cold: (o.items||[]).some(i=>i.cold)
    }));
  }catch(e){ console.error('خطا در گرفتن سفارش‌های کاربر', e); }
  // نکتهٔ مهم: اینجا render('orders') صدا نمی‌زنیم چون render خودش onEnter را دوباره
  // صدا می‌زد و چون onEnter('orders') همین loadMyOrders را صدا می‌زند، حلقهٔ بی‌پایان می‌شد.
  // به‌جایش فقط HTML را مستقیم به‌روزرسانی می‌کنیم.
  if(cur==='orders'){ app.innerHTML=SCREENS['orders'](); const b=app.querySelector('.body'); if(b)b.scrollTop=0; }
  if(cur==='support' && !order.supportName){ app.innerHTML=SCREENS['support'](); } // dropdown سفارش‌ها را به‌روز کن
}
function timeAgoFa(iso){
  if(!iso) return '';
  const diffMin=Math.max(0,Math.round((Date.now()-new Date(iso).getTime())/60000));
  if(diffMin<1) return 'همین الان';
  if(diffMin<60) return toFa(diffMin)+' دقیقه پیش';
  const h=Math.floor(diffMin/60);
  if(h<24) return toFa(h)+' ساعت پیش';
  return toFa(Math.floor(h/24))+' روز پیش';
}

// از سرور می‌پرسد آیا داروساز نسخه را بررسی کرده — هر ۳ ثانیه یک‌بار
// OTC: منتظر تأیید داروساز — وقتی داروساز قیمت زد مستقیم به invoice می‌رود
let otcWaitTimer=null;
function startOtcWaitPolling(){
  clearTimeout(otcWaitTimer);
  const tick=async()=>{
    if(cur!=='otcWait'||!order.serverId){otcWaitTimer=setTimeout(tick,3000);return;}
    try{
      const { order: srv } = await api('/api/orders/'+order.serverId);
      if(srv.status==='rejected'){ order.rejectReason=srv.rejectReason||'سفارش رد شد.'; notify('error'); go('rxRejected'); return; }
      if(srv.status==='awaiting_payment'){
        // داروساز قیمت زد — مستقیم به invoice می‌رویم
        order.fee=srv.fee||srv.total||0;
        order.total=srv.total||srv.fee||0;
        order.serverStatus='awaiting_payment';
        notify('success'); go('invoice'); return;
      }
    }catch(e){ console.error('خطای polling OTC', e); }
    otcWaitTimer=setTimeout(tick,3000);
  };
  tick();
}

function startReviewPolling(){
  clearTimeout(reviewTimer);
  const tick=async()=>{
    if(cur!=='wait' || !order.serverId) { reviewTimer=setTimeout(tick,3000); return; }
    try{
      const { order: srv } = await api('/api/orders/'+order.serverId);
      if(srv.status==='rejected'){ order.reviewStatus='rejected'; order.rejectReason=srv.rejectReason||'نسخه تأیید نشد.'; notify('error'); go('rxRejected'); return; }
      if(srv.status==='review' || srv.status==='items_sent'){
        // داروساز اقلام را وارد کرد و فرستاد (بدون قیمت) — یعنی آماده‌ایم برویم سراغ تأیید کاربر
        order.items = srv.items.map(it=>({...fromServerItem(it), maxQty: it.qty}));
        order.hasCold = order.items.some(i=>i.cold);
        order.reviewed = true; order.status='priced';
        notify('success'); render('wait'); return;
      }
    }catch(e){ console.error('خطا در گرفتن وضعیت از سرور', e); }
    reviewTimer=setTimeout(tick,3000);
  };
  tick();
}

// از سرور می‌پرسد آیا داروساز قیمت نهایی را تأیید کرد — هر ۳ ثانیه یک‌بار
function startPriceWaitPolling(){
  clearTimeout(priceTimer);
  const tick=async()=>{
    if(cur!=='priceWait' || !order.serverId){ priceTimer=setTimeout(tick,3000); return; }
    try{
      const { order: srv } = await api('/api/orders/'+order.serverId);
      if(srv.status==='awaiting_payment'){
        order.items = srv.items.map(fromServerItem);
        order.serverStatus = 'awaiting_payment';
        order.fee = srv.fee; notify('success'); go('invoice'); return;
      }
      if(srv.status==='rejected'){ order.rejectReason=srv.rejectReason||'نسخه رد شد.'; notify('error'); go('rxRejected'); return; }
    }catch(e){ console.error('خطا در گرفتن وضعیت از سرور', e); }
    priceTimer=setTimeout(tick,3000);
  };
  tick();
}

// از سرور می‌پرسد داروساز مرحلهٔ تحویل را تا کجا پیش برده — هر ۴ ثانیه یک‌بار
// (به‌جای تایمر تقلبی قبلی که خودش پیش می‌رفت)
function startDeliveryPolling(){
  clearTimeout(trackTimer);
  const pickup = order.deliver==='pickup';
  const tick=async()=>{
    if(cur!=='tracking' || !order.serverId){ trackTimer=setTimeout(tick,4000); return; }
    try{
      const { order: srv } = await api('/api/orders/'+order.serverId);
      // نگاشت وضعیت متنی سرور (paid/preparing/ready/delivered + deliveryStage) به یک عدد ساده
      // که تمپلیت tracking() از قبل با آن کار می‌کند:
      // حضوری: 0=پرداخت‌شده، 1=آماده‌سازی، 2=آمادهٔ تحویل حضوری (پایان)
      // ارسالی: 0=پرداخت‌شده، 1=آماده‌سازی، 2=آماده، 3=تحویل پیک/در مسیر، 4=تحویل شد (پایان)
      let newStage = 0;
      const ds = srv.deliveryStage||0;
      if(pickup){
        if(srv.status==='delivered') newStage = 2;
        else if(srv.status==='ready') newStage = 2;
        else if(srv.status==='preparing') newStage = 1;
      } else {
        if(srv.status==='delivered' || ds>=3) newStage = 4;
        else if(ds>=1) newStage = 3;
        else if(srv.status==='ready') newStage = 2;
        else if(srv.status==='preparing') newStage = 1;
      }
      if(newStage !== order.trackStage){
        order.trackStage = newStage;
        notify('success');
        // نکتهٔ مهم: render کامل صدا نمی‌زنیم چون onEnter('tracking') را دوباره صدا می‌زد
        // و startDeliveryPolling دوباره اجرا می‌شد (چندتایی‌شدن تایمر). فقط HTML را آپدیت می‌کنیم.
        if(cur==='tracking'){ app.innerHTML=SCREENS['tracking'](); const b=app.querySelector('.body'); if(b)b.scrollTop=0; }
      }
    }catch(e){ console.error('خطا در گرفتن وضعیت تحویل از سرور', e); }
    trackTimer=setTimeout(tick,4000);
  };
  tick();
}
// توجه: finishReview قدیمی (شبیه‌سازی محلی) حذف شد چون الان startReviewPolling/startPriceWaitPolling
// واقعاً از سرور می‌پرسند. pharmacistItems() هنوز برای منوی «پیش‌نمایش حالت‌ها (دمو)» در پروفایل لازم است.
function finishOrder(){
  order.code = order.serverId || ('PSP-'+toFa(Math.floor(10000+Math.random()*89999)));
  order.status='placed';
  if(order.saveMeds){ order.items.forEach(it=>{ if(!SAVED.some(s=>s.name===it.name)) SAVED.unshift({...it,qty:1,date:'امروز'}); }); }
  if(order.pay==='wallet'){ wallet.balance-=totals().total; wallet.txns.unshift({t:'پرداخت سفارش '+order.code,amt:-totals().total,date:'امروز'}); }
  const payload={code:order.code,trackingCode:order.trackingCode,person:order.usePerson||order.fullName,note:order.rxNote,
    baseIns:order.baseIns,suppIns:order.suppIns,items:order.items,totals:totals(),pay:order.pay,deliver:order.deliver,addr:ADDRS[order.addr],speed:order.speed,hasCold:order.hasCold};
  if(tg&&tg.sendData){ try{tg.sendData(JSON.stringify(payload));}catch(e){console.log(payload);} } else console.log('ORDER →',payload);
  notify('success'); go('success');
  // ثبت نهایی روی سرور تا هم در «سفارش‌های من» و هم در پنل داروساز دیده شود
  const payMethod = order.pay==='cod' ? 'cod' : 'online'; // حضوری = پرداخت در محل، غیر آن = آنلاین/کیف‌پول (همان لحظه پرداخت‌شده تلقی می‌شود)
  (async()=>{
    try{
      if(order.serverId){
        // مسیر نسخه‌دار: سفارش از قبل روی سرور هست، تحویل را ثبت و پرداخت را تأیید می‌کنیم
        await api('/api/orders/'+order.serverId+'/delivery', { method:'POST', body: JSON.stringify({ deliver: order.deliver, addr: ADDRS[order.addr] }) });
        await api('/api/orders/'+order.serverId+'/mark-paid', { method:'POST', body: JSON.stringify({ payMethod }) });
      } else {
        // مسیر OTC/کالا: تا الان هیچ سفارشی روی سرور نبود، همین الان می‌سازیم (در وضعیت پرداخت‌شده)
        const { order: created } = await api('/api/orders', { method:'POST', body: JSON.stringify({
          name: order.fullName || profileNameFallback(), forWhom: order.usePerson||'خودم',
          phone: order.phone || '', note: order.note||'', type: order.flow||'otc', telegramUserId: getTelegramUserId(),
          items: order.items, fee: shippingFee(), status: 'paid', total: totals().total,
          deliver: order.deliver, addr: ADDRS[order.addr]
        })});
        order.serverId = created.id; order.code = created.id;
      }
    }catch(e){ console.error('ثبت نهایی سفارش روی سرور ناموفق بود', e); }
  })();
}

/* ===================== Events ===================== */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const a=t.dataset.act;
  if(a==='pick'){ order[t.dataset.group]=isNaN(+t.dataset.val)?t.dataset.val:+t.dataset.val; haptic('light'); render(cur,false); return; }
  switch(a){
    case 'back': back(); break;
    case 'tab': haptic('light'); gotoTab(t.dataset.screen); break;
    case 'openSearch': order.searchQ=''; go('search'); break;
    case 'clearSearch':{ order.searchQ=''; const inp=app.querySelector('#search-input'); if(inp){inp.value='';inp.focus();} const box=app.querySelector('#search-results'); if(box)box.innerHTML=searchResults(''); t.style.display='none'; break; }
    case 'addSearch':{ const m=OTC_DB[+t.dataset.i]; if(!m)break;
      order.flow='otc'; order.reqType='otc';
      const exists=order.items.find(i=>i.name===m.fullName);
      if(exists){ exists.qty++; toast(m.name+' — تعداد افزایش یافت'); }
      else { order.items.push({name:m.fullName,form:'OTC',unit:0,qty:1,cold:false,icon:m.icon||'pill',pending:false}); toast(m.name+' به سبد اضافه شد'); }
      order.hasCold=false; notify('success');
      // آپدیت صفحهٔ سرچ بدون از دست دادن فوکوس
      app.innerHTML=SCREENS['search']();
      const inp2=app.querySelector('#search-input');
      const box2=app.querySelector('#search-results');
      if(inp2){ inp2.value=order.searchQ||''; try{inp2.focus(); inp2.setSelectionRange(inp2.value.length,inp2.value.length);}catch(e){} }
      if(box2) box2.innerHTML=searchResults((order.searchQ||'').trim());
      inp2&&inp2.addEventListener('input',()=>{ order.searchQ=inp2.value; const clr=app.querySelector('#clr'); if(clr)clr.style.display=order.searchQ?'':'none'; box2.innerHTML=searchResults(order.searchQ.trim()); });
      break; }
    case 'goToOtcCart':{
      if(!order.items.length){toast('حداقل یک قلم انتخاب کنید');break;}
      // کاربر نام رو وارد کنه (مثل نسخه‌دار)
      go('otcPersonInfo');
      break; }
    case 'backToSearch': go('search'); break;
    case 'otcInc':{ const it=order.items[+t.dataset.i]; if(it){it.qty++;} app.innerHTML=SCREENS['otcPersonInfo'](); break; }
    case 'otcDec':{ const it=order.items[+t.dataset.i]; if(it){it.qty=Math.max(1,it.qty-1);} app.innerHTML=SCREENS['otcPersonInfo'](); break; }
    case 'otcDel':{ order.items.splice(+t.dataset.i,1); if(!order.items.length){go('search');}else{app.innerHTML=SCREENS['otcPersonInfo']();} break; }
    case 'submitOtc':{
      const nameEl=app.querySelector('#otc-name'), phoneEl=app.querySelector('#otc-phone'), noteEl=app.querySelector('#otc-note');
      const name=(nameEl&&nameEl.value.trim())||'';
      const phone=(phoneEl&&phoneEl.value.trim())||'';
      if(!name){toast('لطفاً نام خود را وارد کنید');return;}
      if(!order.items.length){toast('سبد خرید خالی است');return;}
      order.fullName=name; order.phone=phone; order.note=(noteEl&&noteEl.value.trim())||'';
      notify('success');
      // OTC به صفحهٔ «در انتظار تأیید داروساز» می‌رود — نه success
      go('otcWait');
      (async()=>{
        try{
          const { order: created } = await api('/api/orders', { method:'POST', body: JSON.stringify({
            name, phone, note: order.note||'', type:'otc', telegramUserId: getTelegramUserId(),
            items: order.items, fee:0, status:'wait', total:0
          })});
          order.serverId=created.id; order.code=created.id;
        }catch(e){ console.error('ثبت سفارش OTC ناموفق بود',e); }
      })();
      break; }
    case 'reqCustom':{
      const customName=(order.searchQ||'').trim();
      if(customName){
        order.flow='otc'; order.reqType='otc';
        order.items.push({name:customName,form:'OTC',unit:0,qty:1,cold:false,icon:'pill',pending:true});
        toast('«'+customName+'» اضافه شد — داروخانه بررسی می‌کند');
      }
      break; }
    case 'start': order.reqType='rx'; go('requestType'); break;
    case 'reqNext': 
      if(order.reqType==='rx'){ go('prescriptionType'); }
      else if(order.reqType==='otc'){ order.flow='otc'; order.items=[]; order.searchQ=''; go('search'); }
      else if(order.reqType==='goods'){ order.flow='goods'; order.items=[]; order.searchQ=''; go('goodsSearch'); }
      else { order.flow=order.reqType; go('productAdd'); }
      break;
    case 'goDetails': go('myDetails'); break;
    case 'editPerson': order.editPerson=+t.dataset.i; order.pLabel=PEOPLE[+t.dataset.i].label; go('personForm'); break;
    case 'addPerson': order.editPerson=-1; order.pLabel='دلخواه'; go('personForm'); break;
    case 'goAddPerson': closeSheet(); order.editPerson=-1; order.pLabel='دلخواه'; go('personForm'); break;
    case 'personLabel': order.pLabel=t.dataset.val; render('personForm',false); break;
    case 'savePerson':{ const nm=app.querySelector('#p-name'),ph=app.querySelector('#p-phone'),nid=app.querySelector('#p-nid'),ti=app.querySelector('#p-title');
      if(!nm||!nm.value.trim()){ toast('نام را وارد کنید'); notify('error'); return; }
      let label=order.pLabel==='دلخواه'?((ti&&ti.value.trim())||'سایر'):order.pLabel;
      const rec={label,name:nm.value.trim(),phone:ph?ph.value.trim():'',nid:nid?nid.value.trim():''};
      if(order.editPerson<0) PEOPLE.push(rec); else PEOPLE[order.editPerson]=rec;
      notify('success'); toast('مشخصات ذخیره شد ✓'); back(); break; }
    case 'delPerson':{ if(order.editPerson>0) PEOPLE.splice(order.editPerson,1); else toast('این مورد قابل حذف نیست'); back(); break; }
    case 'useMine': captureRx();
      if(order.useMine){ order.useMine=false; order.usePerson=''; order.fullName='';order.phone='';order.nationalId=''; render('eRxForm',false); }
      else { openPeopleSheet(); }
      break;
    case 'usePerson':{ const p=PEOPLE[+t.dataset.i]; if(!p)break; captureRx(); order.fullName=p.name; order.phone=p.phone; order.nationalId=p.nid; order.useMine=true; order.usePerson=p.label; closeSheet(); notify('success'); render('eRxForm',false); break; }
    case 'ordFilter': order.ordFilter=t.dataset.val; haptic('light'); app.innerHTML=SCREENS['orders'](); break;
    case 'openOrder': openOrderById(t.dataset.id); break;
    case 'prescNext': go(order.prescType==='paperRx'?'paperUpload':'eRxForm'); break;
    case 'pickIns': captureRx(); openSheet(t.dataset.kind==='supp'?'بیمهٔ تکمیلی':'بیمهٔ پایه', t.dataset.kind==='supp'?SUPP_INS:BASE_INS, t.dataset.kind==='supp'?order.suppIns:order.baseIns, t.dataset.kind); break;
    case 'setIns': captureRx(); if(t.dataset.kind==='supp')order.suppIns=t.dataset.val; else order.baseIns=t.dataset.val; closeSheet(); render('eRxForm',false); break;
    case 'submitRx':{
      if(order.prescType!=='paperRx'){
        captureRx();
        if(!order.fullName.trim()){ toast('نام و نام خانوادگی را وارد کنید'); notify('error'); return; }
        if(onlyDigits(order.trackingCode).length<5){ toast('کد رهگیری باید حداقل ۵ رقم باشد'); notify('error'); return; }
        if(onlyDigits(order.nationalId).length!==10){ toast('کد ملی باید ۱۰ رقمی باشد'); notify('error'); return; }
        const p=onlyDigits(order.phone);
        if(p.length!==11||!p.startsWith('09')){ toast('شمارهٔ تماس باید با ۰۹ و ۱۱ رقمی باشد'); notify('error'); return; }
        if(!order.baseIns){ toast('بیمهٔ پایه را انتخاب کنید'); notify('error'); return; }
        order.flow='eRx';
      } else {
        // نسخهٔ کاغذی: عکس + نام + شماره اجباری
        const nm=app.querySelector('#f-pname'), ph=app.querySelector('#f-pphone'), nt=app.querySelector('#f-note');
        if(nm) order.fullName=nm.value.trim();
        if(ph) order.phone=ph.value.trim();
        if(nt) order.rxNote=nt.value.trim();
        if(!order.rxImageData){ toast('لطفاً تصویر نسخه را بارگذاری کنید'); notify('error'); return; }
        if(!order.fullName){ toast('نام و نام خانوادگی را وارد کنید'); notify('error'); return; }
        const pp=onlyDigits(order.phone);
        if(pp.length!==11||!pp.startsWith('09')){ toast('شمارهٔ تماس باید با ۰۹ و ۱۱ رقمی باشد'); notify('error'); return; }
        order.flow='paperRx'; order.trackingCode='';
      }
      order.reviewed=false; order.status='pending_review'; order.rxItemsAck=false;
      go('wait');
      // ثبت واقعی سفارش روی سرور — پنل داروساز همین الان آن را در صف می‌بیند
      (async()=>{
        try{
          const { order: created } = await api('/api/orders', { method:'POST', body: JSON.stringify({
            name: order.fullName || profileNameFallback(), forWhom: order.usePerson||'خودم',
            nid: order.nationalId, phone: order.phone, type: order.flow||'otc', track: order.trackingCode,
            baseIns: order.baseIns, suppIns: order.suppIns, note: order.rxNote,
            telegramUserId: getTelegramUserId()
          })});
          order.serverId = created.id; // شناسهٔ واقعی سفارش روی سرور
          // اگر کاربر تصویر نسخهٔ کاغذی انتخاب کرده بود، همین الان به سرور می‌فرستیم
          if(order.rxImageData){
            await api('/api/orders/'+created.id+'/image', { method:'POST', body: JSON.stringify({
              imageData: order.rxImageData, imageName: order.rxImageName
            })});
          }
        }catch(e){ console.error('ثبت سفارش روی سرور ناموفق بود', e); }
      })();
      break;
    }
    case 'qtyMinus':{ order.draftQty=Math.max(1,(order.draftQty||2)-1); const v=app.querySelector('#qv'); if(v)v.textContent=toFa(order.draftQty); haptic('light'); break; }
    case 'qtyPlus':{ order.draftQty=(order.draftQty||2)+1; const v=app.querySelector('#qv'); if(v)v.textContent=toFa(order.draftQty); haptic('light'); break; }
    case 'prodSearch':{
      const q=(document.getElementById('prod-q')?.value||'').trim();
      if(!q){ toast('نام محصول را بنویسید'); return; }
      order._prodQuery=q; order._prodLoading=true; order._prodResults=[]; render();
      (async()=>{
        try{
          const res=await fetch(`https://www.pirsalehipharmacy.com/api/products?q=${encodeURIComponent(q)}&page=1`);
          const data=await res.json();
          order._prodResults=data.products||[];
        }catch(e){
          // fallback: سرچ در دیتابیس محلی
          order._prodResults=PRODUCTS_DB.filter(p=>p.title.includes(q)||p.title.toLowerCase().includes(q.toLowerCase())).slice(0,15).map(p=>({
            id:p.id, title:p.title, current_price:p.price, image_link:p.img,
            page_url:p.url, availability:p.avail, summary:''
          }));
        }
        order._prodLoading=false; render();
      })();
      break; }

    case 'addProdToCart':{
      const i=parseInt(el.dataset.prodI);
      const p=order._prodResults[i];
      if(!p) return;
      if(order.items.some(it=>it._prodId===p.id)){ toast('این محصول قبلاً افزوده شد'); return; }
      order.items.push({
        name:p.title, qty:1, unit:p.current_price||p.price||0,
        icon:'drop', form:'محصول', cold:false, avail:true,
        _prodId:p.id, _prodUrl:p.page_url, _prodImg:p.image_link, pending:false
      });
      toast('به سبد اضافه شد ✓'); render();
      break; }

    case 'prodDone':{
      if(!order.items.filter(it=>it._prodId).length){ toast('ابتدا یک محصول انتخاب کنید'); return; }
      order.flow='goods';
      go('deliveryMethod');
      break; }
    case 'toInvoice': go('itemsConfirm'); break;
    case 'rxDec':{ const it=order.items[+t.dataset.i]; if(it){it.qty=Math.max(1,it.qty-1); app.innerHTML=SCREENS['itemsConfirm']();} break; }
    case 'rxDel':{
      const idx=+t.dataset.i; const it=order.items[idx];
      if(!it) break;
      if(confirm('مطمئنی می‌خوای «'+it.name+'» رو حذف کنی؟')){
        it.deleted=true; // دی‌اکتیو، نه حذف فیزیکی
        order.hasCold=order.items.filter(i=>!i.deleted&&i.avail!==false).some(i=>i.cold);
        app.innerHTML=SCREENS['itemsConfirm']();
      }
      break; }
    case 'rxRestore':{
      const it=order.items[+t.dataset.i];
      if(it){ it.deleted=false; app.innerHTML=SCREENS['itemsConfirm'](); }
      break; }
    case 'rxAck': order.rxItemsAck=!order.rxItemsAck; haptic('light'); app.innerHTML=SCREENS['itemsConfirm'](); break;
    case 'rxConfirm':{
      const activeItems=order.items.filter(it=>!it.deleted&&it.avail!==false);
      const unavailItems=order.items.filter(it=>it.avail===false&&!it.deleted);
      if(!activeItems.length){toast('حداقل یک قلم موجود لازم است');return;}
      if(!order.rxItemsAck){toast('لطفاً اقلام را تأیید کنید');return;}
      if(unavailItems.length){
        const msg=toFa(unavailItems.length)+' قلم از نسخهٔ شما موجود نیست.\nآیا می‌خواهید اقلام موجود را آماده کنیم؟';
        if(!confirm(msg)) return;
      }
      // حذف کامل اقلام ناموجود و دی‌اکتیوشده
      order.items=activeItems;
      order.hasCold=order.items.some(i=>i.cold);
      go('priceWait');
      (async()=>{
        try{ await api('/api/orders/'+order.serverId+'/confirm-items', { method:'POST', body: JSON.stringify({ items: order.items }) }); }
        catch(e){ console.error('ارسال تأیید اقلام ناموفق بود', e); }
      })();
      break;
    }
    case 'incQty':{ const it=order.items[+t.dataset.i]; if(it){it.qty++; render('invoice',false);} break; }
    case 'decQty':{ const it=order.items[+t.dataset.i]; if(it){it.qty=Math.max(1,it.qty-1); render('invoice',false);} break; }
    case 'removeItem':{ order.items.splice(+t.dataset.i,1); order.hasCold=order.items.some(i=>i.cold); render('invoice',false); break; }
    case 'invoiceNext': go(order.hasCold?'coldChain':'deliveryMethod'); break;
    case 'addOtcToOrder': order.searchQ=''; go('search'); break; // کاربر از فاکتور نسخه وارد سرچ OTC می‌شود
    case 'ackCold': order.ackCold=!order.ackCold; haptic('light'); render('coldChain',false); break;
    case 'coldNext': if(!order.ackCold){toast('لطفاً شرایط نگهداری را تأیید کنید');return;} go('deliveryMethod'); break;
    case 'deliverNext':
      if(order.flow==='goods'){
        if(!order.deliver){ toast('روش تحویل را انتخاب کنید'); return; }
        if(order.deliver==='pickup'){ go('payment'); }
        else { go('addressShipping'); } // پیک یا پست: آدرس اجباری
      }
      else if(order.deliver==='pickup'){ order.pay='cod'; finishOrder(); }
      else { go('addressShipping'); }
      break;
    case 'addrType':{ const ta=app.querySelector('#a-addr'),ti=app.querySelector('#a-title'); if(ta)order.addrText=ta.value; if(ti)order.addrTitle=ti.value; order.addrTitleType=t.dataset.val; render('addressForm',false); break; }
    case 'addAddr': go('addressForm'); break;
    case 'saveAddr':{ const ta=app.querySelector('#a-addr'),ti=app.querySelector('#a-title'),tn=app.querySelector('#a-note');
      const text=(ta&&ta.value.trim())||'آدرس جدید';
      const note=(tn&&tn.value.trim())||'';
      const tt=order.addrTitleType||'home';
      const title=tt==='home'?'خانه':tt==='work'?'محل کار':((ti&&ti.value.trim())||'سایر');
      const ic=tt==='home'?'home':tt==='work'?'brief':'pin';
      const zone=/باجک|۱۹ دی|19 دی|نوزده دی/.test(text)?'bajak':'';
      const fullAddr=note?text+' — '+note:text;
      ADDRS.push([ic,title,fullAddr,zone]); saveAddrs(); order.addr=ADDRS.length-1; order.addrTitleType='home'; order.addrTitle=''; order.addrText=''; order.addrNote='';
      notify('success'); toast(zone==='bajak'?'آدرس در محدودهٔ باجک ذخیره شد — ارسال رایگان ✓':'آدرس «'+title+'» ذخیره شد ✓'); back(); break; }
    case 'addrNext':
      if(order.addr==null||!ADDRS[order.addr]){ toast('لطفاً یک آدرس انتخاب یا اضافه کنید'); return; }
      go('payment'); break;
    case 'promo': toast('کد تخفیف نامعتبر است'); break;
    case 'finish':
      if(order.pay==='wallet' && wallet.balance<totals().total){ notify('error'); toast('موجودی کیف پول کافی نیست'); go('walletScreen'); break; }
      if(order.pay==='online' && !order.payTried){ order.payTried=true; notify('error'); go('payFailed'); break; }
      finishOrder(); break;
    case 'retryPay': back(); break;
    case 'payByWallet': order.pay='wallet'; finishOrder(); break;
    case 'rxRetry': order.reviewed=false; order.reviewStatus=''; go(order.prescType==='paperRx'?'paperUpload':'eRxForm'); break;
    case 'partialContinue': order.items=order.items.filter(i=>i.avail!==false); order.hasCold=order.items.some(i=>i.cold); order.status='priced'; go('itemsConfirm'); break;
    case 'toggleSave': order.saveMeds=!order.saveMeds; t.classList.toggle('off'); haptic('light'); break;
    case 'track': order.trackStage=0; if(order.flow==='goods'&&!order.serverStatus)order.serverStatus='paid'; go('tracking'); break;
    case 'goHome': gotoTab('home'); break;
    case 'goWallet': go('walletScreen'); break;
    case 'setTopup': order.topup=+t.dataset.val; haptic('light'); render('walletScreen',false); break;
    case 'chargeWallet': order.gwAmount=order.topup||50000; order.gwPurpose='wallet'; go('gateway'); break;
    case 'gwOtp': toast('رمز پویا پیامک شد (نمونه)'); break;
    case 'gwPay':{ if(order.gwPurpose==='wallet'){ wallet.balance+=order.gwAmount; wallet.txns.unshift({t:'شارژ کیف پول',amt:order.gwAmount,date:'امروز'}); } notify('success'); toast('پرداخت موفق — کیف پول شارژ شد ✓'); back(); break; }
    case 'openChat': go('support'); break;
    case 'chatSend': doChatSend(); break;
    case 'startSupport':{
      const nm=app.querySelector('#sup-name'), so=app.querySelector('#sup-order');
      if(!nm||!nm.value.trim()){ toast('لطفاً نام خود را وارد کنید'); notify('error'); return; }
      order.supportName=nm.value.trim();
      order.supportOrder=(so&&so.value)||'';
      render('support');
      break; }
    case 'goToGoodsCart': go('goodsCart'); break;
    case 'backToGoodsSearch': go('goodsSearch'); break;
    case 'clearGoodsSearch': order.searchQ=''; go('goodsSearch'); break;
    case 'goodsAdd':{
      const gid=t.dataset.gid;
      const prod=PRODUCTS_DB.find(p=>p.id===gid);
      if(!prod)break;
      const ex=order.items.find(it=>it.goodsId===gid);
      if(ex){ ex.qty++; }
      else { order.items.push({name:prod.title,unit:prod.price,qty:1,goodsId:gid,goodsImg:prod.img,icon:'drop',cold:false,avail:true}); }
      app.innerHTML=SCREENS['goodsSearch']();
      bindGoodsInput();
      break; }
    case 'goodsDec':{
      const gid=t.dataset.gid;
      const ex=order.items.find(it=>it.goodsId===gid);
      if(ex){ ex.qty=Math.max(0,ex.qty-1); if(!ex.qty) order.items=order.items.filter(it=>it.goodsId!==gid); }
      app.innerHTML=SCREENS['goodsSearch']();
      bindGoodsInput();
      break; }
    case 'goodsCartInc':{ const i=+t.dataset.i; if(order.items[i]) order.items[i].qty++; app.innerHTML=SCREENS['goodsCart'](); break; }
    case 'goodsCartDec':{ const i=+t.dataset.i; if(order.items[i]&&order.items[i].qty>1) order.items[i].qty--; app.innerHTML=SCREENS['goodsCart'](); break; }
    case 'goodsCartDel':{ order.items.splice(+t.dataset.i,1); if(!order.items.length){go('goodsSearch');}else{app.innerHTML=SCREENS['goodsCart']();} break; }
    case 'goodsCheckout':
      order.flow='goods';
      go('goodsPersonInfo');
      break;
    case 'goodsPersonNext':{
      const nm=app.querySelector('#g-name'), ph=app.querySelector('#g-phone');
      if(!nm||!nm.value.trim()){ toast('نام و نام خانوادگی را وارد کنید'); notify('error'); return; }
      if(!ph||!ph.value.trim()){ toast('شمارهٔ تماس را وارد کنید'); notify('error'); return; }
      const gnote=app.querySelector('#g-note');
      order.fullName=nm.value.trim(); order.phone=ph.value.trim(); order.note=(gnote&&gnote.value.trim())||'';
      go('deliveryMethod'); break; }
    case 'support': toast('داروخانهٔ پیرصالحی — ۰۲۱-۱۲۳۴۵۶'); break;
    case 'upload':{
      // در تلگرام WebApp، programmatic inp.click() بلاک می‌شود.
      // راه‌حل: یک input واقعی با id ثابت در DOM داریم و کاربر از طریق label کلیک می‌کند.
      // این input را در paperUpload template به‌صورت مخفی گذاشته‌ایم.
      const inp = document.getElementById('rx-file-input');
      if(inp) inp.click(); // اگر مرورگر معمولی بود این کار می‌کند
      break;
    }
  }
});

/* ===================== Boot ===================== */
(function boot(){
  if(tg){ tg.ready(); tg.expand();
    try{ tg.setHeaderColor && tg.setHeaderColor('#2EA84E'); tg.setBackgroundColor && tg.setBackgroundColor('#F4F7F5'); }catch(e){}
    tg.BackButton && tg.BackButton.onClick(()=>back());
  }
  render('home');
})();
</script>
</body>
</html>
